<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocotarot:生命密碼分析系統</title>
    <style>
        :root { 
            --main-purple: #DCD6F7;
            --accent-pink: #FFB7B2;
            --gold: #FFDAC1;
            --font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
        }
        
        body { 
            font-family: var(--font-family); 
            background: radial-gradient(circle at 50% 50%, #1e272e 0%, #0c1445 50%, #050505 100%);
            background-attachment: fixed;
            color: #fff; margin: 0; padding: 10px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); 
            padding: 20px; border-radius: 30px; width: 100%; max-width: 900px;
            border: 1px solid rgba(255, 255, 255, 0.2); box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 10px 0;
        }

        .input-group { 
            display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px;
        }
        input { 
            padding: 12px; border-radius: 12px; border: none; background: #B9FBC0; 
            color: #444; font-size: 16px; width: 100%; box-sizing: border-box; 
        }
        button.primary-btn { 
            background: #7FB3D5; color: #fff; border: none; padding: 15px; 
            border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }

        .people-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .people-grid.dual { grid-template-columns: 1fr 1fr; } }

        .person-box { 
            background: rgba(255, 255, 255, 0.08); padding: 20px; 
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); 
        }
        
        .map { display: flex; flex-direction: column; align-items: center; margin: 15px 0; }
        .row { display: flex; gap: 10px; margin: 5px 0; }
        
        .box { 
            width: 45px; height: 45px; border: 2px solid #00d2ff; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; border-radius: 12px; font-weight: bold; 
            background: rgba(0, 20, 60, 0.6); color: #00d2ff;
        }

        .main-num { 
            border: 3px solid #ff4d4d; color: #ff4d4d; 
            background: rgba(60, 0, 0, 0.6); box-shadow: 0 0 15px rgba(255, 77, 77, 0.8); 
        }

        .desc-box { 
            margin-top: 15px; padding: 15px; background: rgba(255, 255, 255, 0.1); 
            border-radius: 15px; font-size: 0.85rem; border-left: 5px solid var(--main-purple); 
        }
        .desc-title { color: var(--main-purple); font-weight: bold; margin-bottom: 8px; }
        .core-desc { background: rgba(255, 183, 178, 0.15); border-left: 5px solid var(--accent-pink); }

        .crystal-tag { padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin: 3px; display: inline-block; color: #444; }
        .tag-金 { background: #F5F5F5; } .tag-木 { background: #C8E6C9; } .tag-水 { background: #BBDEFB; } .tag-火 { background: #FFCDD2; } .tag-土 { background: #FFF9C4; }

        .el-table { width: 100%; border-collapse: separate; border-spacing: 2px; margin-top: 15px; }
        .el-table th { background: #A2D9CE; color: #444; padding: 8px; border-radius: 8px 8px 0 0; }
        .el-table td { background: #FEF9E7; color: #5D6D7E; padding: 10px; text-align: center; font-weight: bold; border-radius: 0 0 8px 8px; }
        .low-score { background: #FADBD8 !important; color: #E74C3C; }

        .whatsapp-btn { 
            display: flex; align-items: center; justify-content: center; margin-top: 20px; 
            padding: 15px; background: #2ecc71; color: white; text-decoration: none; 
            border-radius: 15px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color: var(--main-purple);">✨ Chocotarot:生命密碼分析 ✨</h2>
    <div class="input-group">
        <input type="date" id="date1">
        <input type="date" id="date2" placeholder="生日 B (合盤用)">
        <button class="primary-btn" onclick="startAnalysis()">啟動命運星圖分析</button>
    </div>
    <div id="resultsArea" style="display:none;">
        <div id="pGrid" class="people-grid"></div>
        <div id="matchCard" style="display:none; margin-top:20px; text-align:center; background:rgba(255,255,255,0.1); padding:20px; border-radius:20px; border:2px dashed var(--main-purple);"></div>
    </div>
</div>

    "4": { title: "4 號：務實的執行者", content: "細心、紀律與責任感，讓計畫落地實踐。嚴謹是優點，但有時過於保守不願承擔風險。", bright: "理性紀律、務實可靠、耐心專注、責任感強", dark: "過於保守嚴肅、不知變通、完美主義、缺乏想像力" },

    "9": { title: "9 號：博愛的夢想家", content: "帶有天生的使命感，渴望改善環境。需學會承認現實的限制，並在細小的日常裡實踐理想。", bright: "遠見宏觀、樂於付出、公平正義、樂觀思維", dark: "不切實際、容易分心、佔有慾強、過度自戀" }

const COMBINATION_DB = {

    "189": "完美主義者,有責任感。想成功必須肯突破,出去闖,比較辛苦。",

    "977": "人緣極好受歡迎。走到哪都是焦點。",
    "988": "拼搏精神強。為事業付出一切,名利雙收。",

const CRYSTAL_DB = { "金": ["白水晶", "白幽靈"], "木": ["綠幽靈", "葡萄石"], "水": ["黑曜石", "藍虎眼"], "火": ["紫水晶", "粉晶"], "土": ["黃水晶", "鈦晶"] };
function getS(n) { let s = String(n).split('').reduce((a,b)=>Number(a)+Number(b),0); return s > 9 ? getS(s) : s; }

function getComboText(a, b, c) {
    let raw = `${a}${b}${c}`;
    if (COMBINATION_DB[raw]) return COMBINATION_DB[raw];
    let s = [a, b, c].sort().join('');
    for (let k in COMBINATION_DB) { if (k.split('').sort().join('') === s) return COMBINATION_DB[k]; }
    return "";
}

function solve(dateStr) {
    const [y, m, d] = dateStr.split('-');
    let n1=getS(d), n2=getS(m), n3=getS(y.slice(0,2)), n4=getS(y.slice(2,4));
    let n5=getS(n1+n2), n6=getS(n3+n4), n7=getS(n5+n6);
    let n8=getS(n6+n7), n9=getS(n5+n7), n10=getS(n8+n9);
    let p3=getS(n1+n5), p2=getS(n2+n5), p1=getS(p2+p3);
    let e1=getS(n3+n6), e2=getS(n4+n6), e3=getS(e1+e2);
    let sc = {"金":0,"木":0,"水":0,"火":0,"土":0};
    const ref = {'1':'金','6':'金','4':'木','9':'木','2':'水','7':'水','3':'火','8':'火','5':'土','0':'土'};
    [n1,n2,n3,n4,n5,n6,n7,n8,n9,n10,p1,p2,p3,e1,e2,e3].forEach(x => { if(ref[x]) sc[ref[x]]++; });
    return { n7, n8, n9, n10, p1, p2, p3, e1, e2, e3, sc };
}

function startAnalysis() {
    const d1 = document.getElementById('date1').value;
    const d2 = document.getElementById('date2').value;
    if(!d1) return alert("請輸入生日 A");
    const res1 = solve(d1);
    let html = renderBox(1, res1);
    if(d2) {
        const res2 = solve(d2);
        html += renderBox(2, res2);
        document.getElementById('pGrid').classList.add('dual');
        const score = 100 - (Math.abs(res1.n7 - res2.n7) * 8);
        let comment = score >= 90 ? "你們是命定般的靈魂伴侶，能量極度契合，溝通無礙且能互相成就。" :
                      score >= 75 ? "雙方性格互補且充滿吸引力，只要彼此包容，便能建立深厚情感連結。" :
                      score >= 55 ? "關係充滿火花但也伴隨挑戰。建議多傾聽對方需求，用耐心化解差異。" :
                                    "性格特質較為迥異，相處需要更多尊重與空間，建議先以朋友角度出發。";
        document.getElementById('matchCard').style.display = 'block';
        document.getElementById('matchCard').innerHTML = `<h3 style="color:var(--main-purple)">💖 契合度：${score}%</h3><p style="font-size:0.9rem;">${comment}</p>`;
    } else {
        document.getElementById('pGrid').classList.remove('dual');
        document.getElementById('matchCard').style.display = 'none';
    }
    document.getElementById('pGrid').innerHTML = html;
    document.getElementById('resultsArea').style.display = 'block';
}

function renderBox(id, res) {
    const bx = (v, c='') => `<div class="box ${c}">${v}</div>`;
    const core = CORE_PERSONALITY[String(res.n7)];
    const lowElements = Object.keys(res.sc).filter(k => res.sc[k] < 3);
    const combos = [
        {nums: `${res.p3}${res.p2}${res.p1}`, text: getComboText(res.p3, res.p2, res.p1)},
        {nums: `${res.n7}${res.n8}${res.n9}`, text: getComboText(res.n7, res.n8, res.n9)},
        {nums: `${res.n8}${res.n9}${res.n10}`, text: getComboText(res.n8, res.n9, res.n10)},
        {nums: `${res.e1}${res.e2}${res.e3}`, text: getComboText(res.e1, res.e2, res.e3)}
    ];

    return `
        <div class="person-box">
            <div style="background:var(--main-purple); color:#444; padding:4px 15px; border-radius:10px; font-size:0.8rem; margin-bottom:10px; font-weight:bold; display:inline-block;">對象 ${id===1?'A':'B'}</div>
            <div class="map">
                <div class="row">${bx(res.n7, 'main-num')}</div>
                <div class="row">${bx(res.n8)+bx(res.n9)}</div>
            </div>
            
            <div class="desc-box core-desc">
                <div class="desc-title" style="color:#FF7675;">🌟 中心位：${core.title}</div>
                <div>${core.content}</div>
                <div style="font-size:0.8rem; margin-top:5px;"><b>• 光明面：</b>${core.bright}</div>
                <div style="font-size:0.8rem;"><b>• 黑暗面：</b>${core.dark}</div>
            </div>

            <div class="desc-box">
                <div class="desc-title">✨ 聯合數字解析</div>
                ${combos.filter(c => c.text).map(c => `<div style="margin-bottom:8px;"><b>[${c.nums}]</b> ${c.text}</div>`).join('')}
            </div>

            <div class="crystal-section" style="margin-top:15px; padding:15px; background:rgba(255,255,255,0.05); border-radius:15px;">
                <div class="desc-title" style="color:var(--gold)">💎 五行能量補強</div>
                ${lowElements.map(el => CRYSTAL_DB[el].map(s => `<span class="crystal-tag tag-${el}">${s}</span>`).join('')).join('')}
            </div>

            <table class="el-table">
                <tr><th>金</th><th>木</th><th>水</th><th>火</th><th>土</th></tr>
                <tr>${["金","木","水","火","土"].map(k => `<td class="${res.sc[k]<3?'low-score':''}">${res.sc[k]}</td>`).join('')}</tr>
            </table>

            <a href="https://wa.me/85263870731" class="whatsapp-btn" target="_blank">詳細解說或訂造五行水晶</a>
        </div>`;
}
</script>
