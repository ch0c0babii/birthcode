<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocotarot:生命密碼分析系統</title>
    <style>
        :root { 
            --main-purple: #DCD6F7;
            --accent-pink: #FFB7B2;
            --gold: #FFDAC1;
            --neon-blue: #B2E2F2;
            --mint-green: #B9FBC0;
            --font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
        }
        
        body { 
            font-family: var(--font-family); 
            background: radial-gradient(circle at 50% 50%, #1e272e 0%, #0c1445 50%, #050505 100%);
            background-attachment: fixed;
            color: #fff; margin: 0; padding: 10px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); 
            padding: 20px; border-radius: 30px; width: 100%; max-width: 900px;
            border: 1px solid rgba(255, 255, 255, 0.2); box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 10px 0;
        }

        .input-group { 
            display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px;
        }
        input { 
            font-family: var(--font-family); padding: 12px; border-radius: 12px; 
            border: none; background: var(--mint-green); color: #444; 
            font-size: 16px; outline: none; width: 100%; box-sizing: border-box; 
        }
        button.primary-btn { 
            font-family: var(--font-family); background: #7FB3D5; color: #fff; 
            border: none; padding: 15px; border-radius: 15px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(127, 179, 213, 0.3);
        }

        .people-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .people-grid.dual { grid-template-columns: 1fr 1fr; } }

        .person-box { 
            background: rgba(255, 255, 255, 0.08); padding: 20px; 
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); 
        }
        
        .map { display: flex; flex-direction: column; align-items: center; margin: 15px 0; }
        .row { display: flex; gap: 10px; margin: 5px 0; }
        
        /* 亮藍邊框數字 */
        .box { 
            width: 45px; height: 45px; 
            border: 2px solid #00d2ff; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; border-radius: 12px; font-weight: bold; 
            background: rgba(0, 20, 60, 0.6); 
            color: #00d2ff;
        }

        /* 紅色發光中間數字 */
        .main-num { 
            border: 3px solid #ff4d4d; 
            color: #ff4d4d; 
            background: rgba(60, 0, 0, 0.6); 
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.8); 
        }

        .extra-label { margin-top: 5px; color: #ddd; font-size: 0.8rem; text-align: center; }

        .desc-box { 
            margin-top: 15px; padding: 15px; background: rgba(255, 255, 255, 0.1); 
            border-radius: 15px; font-size: 0.85rem; border-left: 5px solid var(--main-purple); 
        }
        .desc-title { color: var(--main-purple); font-weight: bold; margin-bottom: 8px; }

        .crystal-section { margin-top: 15px; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 15px; border-left: 5px solid var(--gold); }
        .crystal-tag { 
            padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; 
            margin: 3px; display: inline-block; color: #444;
        }
        .tag-金 { background: #F5F5F5; } 
        .tag-木 { background: #C8E6C9; } 
        .tag-水 { background: #BBDEFB; } 
        .tag-火 { background: #FFCDD2; } 
        .tag-土 { background: #FFF9C4; }

        .el-table { width: 100%; border-collapse: separate; border-spacing: 2px; margin-top: 15px; }
        .el-table th { background: #A2D9CE; color: #444; padding: 10px; border-radius: 8px 8px 0 0; }
        .el-table td { background: #FEF9E7; color: #5D6D7E; padding: 12px; text-align: center; font-weight: bold; font-size: 1.1rem; border-radius: 0 0 8px 8px; }
        .low-score { background: #FADBD8 !important; color: #E74C3C; }

        .whatsapp-btn { 
            display: flex; align-items: center; justify-content: center; margin-top: 20px; 
            padding: 15px; background: #2ecc71; color: white; text-decoration: none; 
            border-radius: 15px; font-weight: bold; font-size: 1rem; transition: 0.3s;
        }
        .whatsapp-btn:hover { background: #27ae60; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color: var(--main-purple);">✨ Chocotarot:生命密碼分析 ✨</h2>
    <div class="input-group">
        <input type="date" id="date1">
        <input type="date" id="date2" placeholder="生日 B (合盤用)">
        <button class="primary-btn" onclick="startAnalysis()">啟動命運星圖分析</button>
    </div>
    <div id="resultsArea" style="display:none;">
        <div id="pGrid" class="people-grid"></div>
        <div id="matchCard" style="display:none; margin-top:20px; text-align:center; background:rgba(255,255,255,0.1); padding:20px; border-radius:20px; border:2px dashed var(--main-purple);"></div>
    </div>
</div>

<script>
// 完整 81 組聯合數字數據庫
const COMBINATION_DB = {
    "112": "做事矛盾,糾結,容易半途而廢,虎頭蛇尾,說一套做一套,多讀書,多突破自我,適合晚婚。",
    "123": "說話不經過大腦,比較感性,懂得察言觀色,反應快,給人感覺圓滑。在意別人說話,好心辦不了好事,善變,適合講師。",
    "134": "感性,衝動,喜歡嘗試,又害怕,矛盾,焦躁,喜歡抱怨。",

    "167": "有財富,願意把所有的錢花到朋友、戀人身上。花錢大手大腳。",

    "189": "完美主義者,有責任感,有壓力感。想成功必須肯突破,出去闖,多經歷事情。",

    "224": "說話溫柔,好聽,但容易糾結。適合靠嘴吃飯的工作,如客服、播音。",
    "235": "脾氣不好,來得快,說話帶攻擊性,容易傷人,直腸子。溝通能力強,執行力強。",
    "246": "靠嘴吃飯,銷售高手,適合做服務行業,做銷售。",
    "257": "人緣好,貴人多。說話有感染力,容易說服他人。",
    "268": "很會賺錢,靠說話、溝通、服務賺錢。財運不錯。",
    "279": "吸引力強,有高級桃花。適合從事公關或演藝事業。",
    "314": "衝動,想做就做。容易因為不冷靜而後悔。行動力極強。",
    "325": "說話帶火氣,容易跟人吵架。雖然心地不壞,但言辭犀利。",
    "336": "容易衝動,脾氣不好,不能賭博,謹慎投資。",
    "347": "聰明,但容易多疑。會為了目的而不斷尋找方法。貴人多。",
    "358": "情緒起伏大,壓力大。需要學會放鬆和排解壓力。",
    "369": "聰明,點子多,想像力豐富。容易成功,但也容易幻想。",
    "415": "保守,不喜歡變動。需要安全感,適合穩定的環境。",
    "426": "分析能力強,靠專業知識或口才賺錢。適合當顧問、分析師。",

    "663": "喜歡投資,一有錢就投資。口袋錢不多,進出很快。",
    "718": "有領導力,責任心強。容易在事業上取得高位。",
    "729": "能吸引高級桃花,貴人多,人緣好。做事順風順水。",

    "753": "人際關係複雜,容易有是非。需要謹言慎行。",
    "764": "專業能力強。容易因為穩定的表現而獲得升遷或財富。",
    "775": "貴人極多,但也容易依賴他人。需要加強自主性。",
    "819": "壓力大,完美主義。為了理想會不斷拼搏,注意身體。",
    "821": "容易因為說話而產生壓力。需要學會溝通與放鬆。",
    "832": "情緒化,易焦躁。壓力來自於內心的不安。",
    "843": "做事細心,但也容易糾結在細節中,產生壓力。",
    "854": "環境變動帶來壓力。需要學會適應新環境。",
    "865": "因為金錢或投資而產生壓力。謹慎理財。",
    "876": "非常有責任感,願意承擔。是大家信賴的領導者。",
    "887": "離婚率高,情緒化,愛發火,疏遠朋友。需要管理情緒。",
    "911": "特立獨行,不喜歡依賴他人。容易成功但也孤獨。",
    "922": "多愁善感,容易受傷。適合從事文藝或療癒工作。",
    "933": "活潑,有創意。永遠保持一顆童心,點子特別多。",
    "944": "踏實,穩重。對知識有渴求,適合做研究。",
    "955": "喜歡自由,不愛受拘束。容易有異地發展的機會。",
    "966": "注重品質生活。會賺錢也會花錢,懂得享受人生。",
    "977": "人緣極好,受歡迎。走到哪裡都是焦點。",
    "988": "拼搏精神強。為了事業可以付出一切,名利雙收。",
    "999": "太貪心,容易眾叛親離,孤獨。需要學會知足。"
};

const CRYSTAL_DB = {
    "金": ["白水晶", "白幽靈"], "木": ["綠幽靈", "葡萄石"], "水": ["黑曜石", "藍虎眼"], "火": ["紫水晶", "粉晶"], "土": ["黃水晶", "鈦晶"]
};

function getS(n) { let s = String(n).split('').reduce((a,b)=>Number(a)+Number(b),0); return s > 9 ? getS(s) : s; }

function getComboText(a, b, c) {
    let raw = `${a}${b}${c}`;
    if (COMBINATION_DB[raw]) return COMBINATION_DB[raw];
    let sortedSearch = [a, b, c].sort().join('');
    for (let key in COMBINATION_DB) {
        if (key.split('').sort().join('') === sortedSearch) return COMBINATION_DB[key];
    }
    return "";
}

function solve(dateStr) {
    const [y, m, d] = dateStr.split('-');
    let n1=getS(d), n2=getS(m), n3=getS(y.slice(0,2)), n4=getS(y.slice(2,4));
    let n5=getS(n1+n2), n6=getS(n3+n4), n7=getS(n5+n6);
    let n8=getS(n6+n7), n9=getS(n5+n7), n10=getS(n8+n9);
    let p3=getS(n1+n5), p2=getS(n2+n5), p1=getS(p2+p3);
    let e1=getS(n3+n6), e2=getS(n4+n6), e3=getS(e1+e2);
    let sc = {"金":0,"木":0,"水":0,"火":0,"土":0};
    const ref = {'1':'金','6':'金','4':'木','9':'木','2':'水','7':'水','3':'火','8':'火','5':'土','0':'土'};
    [n1,n2,n3,n4,n5,n6,n7,n8,n9,n10,p1,p2,p3,e1,e2,e3].forEach(x => { if(ref[x]) sc[ref[x]]++; });
    return { dateStr, n1, n2, n3, n4, n5, n6, n7, n8, n9, n10, p1, p2, p3, e1, e2, e3, sc };
}

function startAnalysis() {
    const d1 = document.getElementById('date1').value;
    const d2 = document.getElementById('date2').value;
    if(!d1) return alert("請輸入生日 A");
    const res1 = solve(d1);
    let html = renderBox(1, res1);
    if(d2) {
        const res2 = solve(d2);
        html += renderBox(2, res2);
        document.getElementById('pGrid').classList.add('dual');
        const score = 100 - (Math.abs(res1.n7 - res2.n7) * 8);
        document.getElementById('matchCard').style.display = 'block';
        document.getElementById('matchCard').innerHTML = `<h3 style="color:var(--main-purple)">💖 契合度：${score}%</h3>`;
    } else {
        document.getElementById('pGrid').classList.remove('dual');
        document.getElementById('matchCard').style.display = 'none';
    }
    document.getElementById('pGrid').innerHTML = html;
    document.getElementById('resultsArea').style.display = 'block';
}

function renderBox(id, res) {
    const bx = (v, c='') => `<div class="box ${c}">${v}</div>`;
    const partnerTxt = getComboText(res.p3, res.p2, res.p1);
    const actionTxt = getComboText(res.n7, res.n8, res.n9);
    const childTxt = getComboText(res.n8, res.n9, res.n10);
    const lateTxt = getComboText(res.e1, res.e2, res.e3);
    const lowElements = Object.keys(res.sc).filter(k => res.sc[k] < 3);

    return `
        <div class="person-box">
            <div style="background:var(--main-purple); color:#444; display:inline-block; padding:4px 15px; border-radius:10px; font-size:0.8rem; margin-bottom:10px; font-weight:bold;">對象 ${id===1?'A':'B'}</div>
            <div class="map">
                <div class="row">${bx(res.n1)+bx(res.n2)+bx(res.n3)+bx(res.n4)}</div>
                <div class="row">${bx(res.n5)+bx(res.n6)}</div>
                <div class="row">${bx(res.n7, 'main-num')}</div>
                <div class="row">${bx(res.n8)+bx(res.n9)}</div>
            </div>
            <div style="display:flex; justify-content:space-around; margin:15px 0;">
                <div><div class="row">${bx(res.p1)+bx(res.p2)+bx(res.p3)}</div><div class="extra-label">伴侶位</div></div>
                <div><div class="row">${bx(res.n10)}</div><div class="extra-label">子女位</div></div>
                <div><div class="row">${bx(res.e1)+bx(res.e2)+bx(res.e3)}</div><div class="extra-label">晚年位</div></div>
            </div>
            
            <div class="desc-box">
                <div class="desc-title">✨ 聯合數字深度解析</div>
                ${partnerTxt ? `<div><b>[伴侶位 ${res.p3}${res.p2}${res.p1}]</b> ${partnerTxt}</div>` : ""}
                ${actionTxt ? `<div style="margin-top:5px;"><b>[核心位 ${res.n7}${res.n8}${res.n9}]</b> ${actionTxt}</div>` : ""}
                ${childTxt ? `<div style="margin-top:5px;"><b>[子女位 ${res.n8}${res.n9}${res.n10}]</b> ${childTxt}</div>` : ""}
                ${lateTxt ? `<div style="margin-top:5px;"><b>[晚年位 ${res.e1}${res.e2}${res.e3}]</b> ${lateTxt}</div>` : ""}
            </div>

            <div class="crystal-section">
                <div class="desc-title">💎 五行能量補強建議</div>
                <p style="font-size:0.75rem; color:#ccc; margin-bottom:10px;">經分析，以下五行較弱，建議配戴：</p>
                ${lowElements.map(el => CRYSTAL_DB[el].map(s => `<span class="crystal-tag tag-${el}">${s}</span>`).join('')).join('')}
            </div>

            <table class="el-table">
                <tr><th>金</th><th>木</th><th>水</th><th>火</th><th>土</th></tr>
                <tr>${["金","木","水","火","土"].map(k => `<td class="${res.sc[k]<3?'low-score':''}">${res.sc[k]}</td>`).join('')}</tr>
            </table>

            <a href="https://wa.me/85263870731" class="whatsapp-btn" target="_blank">詳細解說或訂造專屬五行水晶</a>
        </div>`;
}
</script>
</body>
</html>
