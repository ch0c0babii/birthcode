const CRY_DB = { "金": ["白水晶", "白幽靈"], "木": ["綠幽靈", "葡萄石"], "水": ["黑曜石", "藍虎眼"], "火": ["紫水晶", "粉晶"], "土": ["黃水晶", "鈦晶"] };
function getS(n) { let s = String(n).split('').reduce((a,b)=>Number(a)+Number(b),0); return s > 9 ? getS(s) : s; }
function getC(a, b, c) {
    let r = `${a}${b}${c}`; if (COMBO_DB[r]) return COMBO_DB[r];
    let s = [a, b, c].sort().join('');
    for (let k in COMBO_DB) { if (k.split('').sort().join('') === s) return COMBO_DB[k]; }
    return "";
}
function solve(dStr) {
    const [y, m, d] = dStr.split('-');
    let n1=getS(d), n2=getS(m), n3=getS(y.slice(0,2)), n4=getS(y.slice(2,4));
    let n5=getS(n1+n2), n6=getS(n3+n4), n7=getS(n5+n6), n8=getS(n6+n7), n9=getS(n5+n7), n10=getS(n8+n9);
    let p3=getS(n1+n5), p2=getS(n2+n5), p1=getS(p2+p3), e1=getS(n3+n6), e2=getS(n4+n6), e3=getS(e1+e2);
    let sc = {"金":0,"木":0,"水":0,"火":0,"土":0};
    const ref = {'1':'金','6':'金','4':'木','9':'木','2':'水','7':'水','3':'火','8':'火','5':'土','0':'土'};
    [n1,n2,n3,n4,n5,n6,n7,n8,n9,n10,p1,p2,p3,e1,e2,e3].forEach(x => { if(ref[x]) sc[ref[x]]++; });
    return { n1, n2, n3, n4, n5, n6, n7, n8, n9, n10, p1, p2, p3, e1, e2, e3, sc };
}
function startAnalysis() {
    const d1 = document.getElementById('date1').value, d2 = document.getElementById('date2').value;
    if(!d1) return alert("請輸入生日 A");
    const res1 = solve(d1); let html = renderBox(1, res1);
    if(d2) {
        const res2 = solve(d2); html += renderBox(2, res2);
        document.getElementById('pGrid').classList.add('dual');
        const score = 100 - (Math.abs(res1.n7 - res2.n7) * 8);
        document.getElementById('matchCard').style.display = 'block';

}

                <div class="row">${bx(res.n7, 'main-num')}</div>
                <div class="row">${bx(res.n8)+bx(res.n9)}</div>
                <div class="row">${bx(res.n10)}</div>
                <div class="row" style="margin-top:20px;">${bx(res.p3)+bx(res.p2)+bx(res.p1)} &nbsp;&nbsp; ${bx(res.e1)+bx(res.e2)+bx(res.e3)}</div>
            </div>
            <div class="desc-box core-desc">
                <div class="desc-title" style="color:#FF7675;">🌟 中心位人格特質</div>
